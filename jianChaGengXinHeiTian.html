<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>容易学APP - 版本检查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* 禁止页面拖动/滚动 - 夜间模式背景改为黑色 */
        html, body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: #000000; /* 夜间模式：纯黑背景 */
            /* 保持画面居中且比例不变的核心样式 */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff; /* 文字改为白色，提升夜间可读性 */
            /* 防止内容溢出 */
            position: relative;
        }

        /* 容器外层 - 固定比例容器（改为9:16竖屏比例） */
        .wrapper {
            /* 固定宽高比 9:16（竖屏手机常用比例） */
            aspect-ratio: 9/16;
            /* 最大宽度/高度限制，防止超出屏幕 */
            max-width: 90vw;
            max-height: 90vh;
            /* 宽度自适应，高度按比例 */
            width: 100%;
            /* 内容居中 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 加载容器样式 */
        .loader-container {
            text-align: center;
            transition: all 0.5s ease;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loading-text {
            font-size: 20px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
            color: #ffffff; /* 加载文字改为白色 */
        }

        /* 加载动画 - 夜间模式适配 */
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3); /* 加载圈边框改为浅白色 */
            border-radius: 50%;
            border-top-color: #ffffff; /* 加载圈顶部改为白色 */
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        /* 结果容器样式 - 夜间模式适配 */
        .result-container {
            background: rgba(0, 0, 0, 0.95); /* 黑色半透明背景 */
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px; /* 微调内边距，适配竖屏 */
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.1); /* 浅白色阴影，适配黑色背景 */
            border: 1px solid rgba(255, 255, 255, 0.2); /* 浅白色边框 */
            /* 宽度自适应外层容器，最大宽度限制 */
            width: 100%;
            max-width: 400px; /* 微调最大宽度，适配竖屏 */
            transform: translateY(20px);
            opacity: 0;
            display: none;
        }

        .result-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffffff; /* 标题改为白色 */
            text-align: center;
            position: relative;
            padding-bottom: 15px;
        }

        .result-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent); /* 白色渐变分隔线 */
        }

        .version-info {
            font-size: 18px;
            margin: 25px 0;
            color: #dddddd; /* 版本信息改为浅白色 */
            line-height: 1.6;
            text-align: center; /* 文字居中，适配竖屏 */
        }

        /* 白色文字+细黑色描边样式（替换原红色） */
        .red-text {
            font-weight: bold;
            color: #ffffff; /* 改为白色 */
            text-shadow: 0.5px 0.5px 0 #000, /* 细黑色描边 - 右下 */
                         -0.5px -0.5px 0 #000, /* 细黑色描边 - 左上 */
                         0.5px -0.5px 0 #000, /* 细黑色描边 - 右上 */
                         -0.5px 0.5px 0 #000; /* 细黑色描边 - 左下 */
        }

        .version-number {
            /* 复用白色描边文字样式 */
            composes: red-text;
        }

        .admin-tip {
            /* 复用白色描边文字样式 */
            composes: red-text;
            font-weight: 600;
        }

        .notice-text {
            font-size: 16px;
            line-height: 1.8;
            color: #dddddd; /* 提示文字改为浅白色 */
            background: rgba(30, 30, 30, 0.8); /* 深灰色背景 */
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #ffffff; /* 白色边框 */
        }

        /* 动画定义 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes showResult {
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 显示结果的动画类 */
        .show-result {
            display: block;
            animation: showResult 0.8s ease forwards;
        }

        /* 禁止文本选择（可选，防止用户选中文字拖动） */
        * {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>
<body>
    <!-- 外层容器 - 控制比例和居中 -->
    <div class="wrapper">
        <!-- 加载界面 -->
        <div class="loader-container" id="loader">
            <div class="loading-text">正在检查最新版本</div>
            <div class="loader"></div>
        </div>

        <!-- 结果展示界面 -->
        <div class="result-container" id="result">
            <div class="result-title">服务器连接成功</div>
            <div class="version-info">
                最新版本：<span class="red-text">0.1测试版</span><br>
                更新时间：<span class="red-text">2026.3.10</span>
            </div>
            <div class="notice-text">
                由于"容易学APP"当前处于测试阶段，服务器暂未完全配置，可联系<span class="red-text">单位相关管理员</span>获取最新版本安装包。
            </div>
        </div>
    </div>

    <script>
        // 等待1秒钟后切换界面
        setTimeout(() => {
            // 隐藏加载界面
            document.getElementById('loader').style.opacity = 0;
            
            // 显示结果界面并添加动画
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result').classList.add('show-result');
            }, 500);
        }, 1000); // 1秒钟延迟

        // 额外防护：禁止触摸滚动（移动端）
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
