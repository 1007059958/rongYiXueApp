<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            color: white;
        }

        #gameCanvas {
            border: 2px solid #ffffff;
            background-color: #2c2c2c;
        }

        .game-info {
            margin-bottom: 10px;
            font-size: 20px;
            display: flex;
            gap: 20px;
        }

        .game-controls {
            margin-top: 15px;
            text-align: center;
        }

        .game-controls p {
            margin-bottom: 8px;
            font-size: 16px;
            color: #cccccc;
        }
    </style>
</head>
<body>
    <div class="game-info">
        <div>得分: <span id="score">0</span></div>
        <div>生命: <span id="lives">3</span></div>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div class="game-controls">
        <p>操作说明：鼠标左右移动控制挡板，点击鼠标开始游戏</p>
    </div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');

        // 游戏参数
        let score = 0;
        let lives = 3;
        let gameStarted = false;

        // 挡板参数
        const paddle = {
            width: 100,
            height: 15,
            x: canvas.width / 2 - 50,
            y: canvas.height - 30,
            speed: 8
        };

        // 小球参数
        const ball = {
            size: 10,
            x: canvas.width / 2,
            y: canvas.height / 2,
            speedX: 4,
            speedY: -4,
            startX: canvas.width / 2,
            startY: canvas.height / 2
        };

        // 砖块参数
        const brickConfig = {
            rows: 5,
            cols: 8,
            width: 70,
            height: 20,
            padding: 5,
            offsetX: 10,
            offsetY: 30,
            bricks: []
        };

        // 初始化砖块
        function initBricks() {
            brickConfig.bricks = [];
            for (let row = 0; row < brickConfig.rows; row++) {
                brickConfig.bricks[row] = [];
                for (let col = 0; col < brickConfig.cols; col++) {
                    brickConfig.bricks[row][col] = {
                        x: col * (brickConfig.width + brickConfig.padding) + brickConfig.offsetX,
                        y: row * (brickConfig.height + brickConfig.padding) + brickConfig.offsetY,
                        isBroken: false
                    };
                }
            }
        }

        // 绘制挡板
        function drawPaddle() {
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.strokeStyle = '#ffffff';
            ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        // 绘制小球
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2);
            ctx.fillStyle = '#FF5722';
            ctx.fill();
            ctx.closePath();
        }

        // 绘制砖块
        function drawBricks() {
            for (let row = 0; row < brickConfig.rows; row++) {
                for (let col = 0; col < brickConfig.cols; col++) {
                    const brick = brickConfig.bricks[row][col];
                    if (!brick.isBroken) {
                        // 不同行的砖块用不同颜色
                        const colors = ['#2196F3', '#9C27B0', '#FF9800', '#00BCD4', '#8BC34A'];
                        ctx.fillStyle = colors[row];
                        ctx.fillRect(brick.x, brick.y, brickConfig.width, brickConfig.height);
                        ctx.strokeStyle = '#ffffff';
                        ctx.strokeRect(brick.x, brick.y, brickConfig.width, brickConfig.height);
                    }
                }
            }
        }

        // 检测小球碰撞
        function checkCollisions() {
            // 碰撞墙壁（左右）
            if (ball.x + ball.size > canvas.width || ball.x - ball.size < 0) {
                ball.speedX = -ball.speedX;
            }

            // 碰撞顶部
            if (ball.y - ball.size < 0) {
                ball.speedY = -ball.speedY;
            }

            // 掉落到底部（损失生命）
            if (ball.y + ball.size > canvas.height) {
                lives--;
                livesElement.textContent = lives;
                resetBallAndPaddle();
                if (lives === 0) {
                    alert(`游戏结束！你的得分是: ${score}`);
                    resetGame();
                }
            }

            // 碰撞挡板
            if (
                ball.y + ball.size > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width
            ) {
                // 小球碰撞挡板不同位置，反弹角度不同
                const collidePoint = ball.x - (paddle.x + paddle.width / 2);
                const normalizedCollidePoint = collidePoint / (paddle.width / 2);
                ball.speedX = normalizedCollidePoint * 5;
                ball.speedY = -ball.speedY;
            }

            // 碰撞砖块
            for (let row = 0; row < brickConfig.rows; row++) {
                for (let col = 0; col < brickConfig.cols; col++) {
                    const brick = brickConfig.bricks[row][col];
                    if (!brick.isBroken) {
                        if (
                            ball.x > brick.x &&
                            ball.x < brick.x + brickConfig.width &&
                            ball.y > brick.y &&
                            ball.y < brick.y + brickConfig.height
                        ) {
                            ball.speedY = -ball.speedY;
                            brick.isBroken = true;
                            score += 10;
                            scoreElement.textContent = score;

                            // 检查是否所有砖块都被打烂
                            checkWin();
                        }
                    }
                }
            }
        }

        // 检查是否获胜
        function checkWin() {
            let allBroken = true;
            for (let row = 0; row < brickConfig.rows; row++) {
                for (let col = 0; col < brickConfig.cols; col++) {
                    if (!brickConfig.bricks[row][col].isBroken) {
                        allBroken = false;
                        break;
                    }
                }
                if (!allBroken) break;
            }

            if (allBroken) {
                alert(`恭喜你获胜！得分: ${score}`);
                resetGame();
            }
        }

        // 重置小球和挡板位置
        function resetBallAndPaddle() {
            ball.x = ball.startX;
            ball.y = ball.startY;
            paddle.x = canvas.width / 2 - paddle.width / 2;
            gameStarted = false;
        }

        // 重置整个游戏
        function resetGame() {
            score = 0;
            lives = 3;
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            initBricks();
            resetBallAndPaddle();
        }

        // 更新游戏状态
        function updateGame() {
            if (gameStarted) {
                // 移动小球
                ball.x += ball.speedX;
                ball.y += ball.speedY;

                // 检测碰撞
                checkCollisions();
            }

            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制所有元素
            drawPaddle();
            drawBall();
            drawBricks();

            // 循环游戏
            requestAnimationFrame(updateGame);
        }

        // 鼠标控制挡板
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            // 限制挡板在画布内
            if (mouseX > 0 && mouseX < canvas.width - paddle.width) {
                paddle.x = mouseX;
            }
        });

        // 鼠标点击开始游戏
        canvas.addEventListener('click', () => {
            if (!gameStarted) {
                gameStarted = true;
            }
        });

        // 初始化游戏
        initBricks();
        updateGame();
    </script>
</body>
</html>
